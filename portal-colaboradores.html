<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Colaborador · AÇÃOPREV</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#e8c96e;--dark:#0D0D0D;--dark2:#141414;
  --dark3:#1C1C1C;--dark4:#242424;--text:#F0EAD6;--text2:#A89880;
  --text3:#666055;--border:rgba(201,168,76,0.18);--border-strong:rgba(201,168,76,0.35);
  --radius:8px;
}
html,body{height:100%;font-family:'Lora',serif;background:var(--dark);color:var(--text);line-height:1.7;font-size:15px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,13,13,0.95);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--border);
  padding:0 clamp(1.5rem,5vw,4rem);display:flex;align-items:center;
  justify-content:space-between;height:72px}
.nav-brand{font-family:'Marcellus',serif;font-size:1rem;letter-spacing:0.22em;color:var(--gold);text-decoration:none}
.nav-back{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);
  text-decoration:none;border:1px solid var(--border-strong);padding:8px 18px;border-radius:2px;
  transition:all 0.25s}
.nav-back:hover{background:rgba(201,168,76,0.08);color:var(--gold)}

/* SCREENS */
.screen{display:none;min-height:100vh;padding-top:72px}
.screen.active{display:flex;flex-direction:column}

/* === LOGIN === */
#login{align-items:center;justify-content:center;padding:5rem 2rem}
.login-inner{width:100%;max-width:560px;text-align:center}
.login-eyebrow{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);
  margin-bottom:1.2rem;display:flex;align-items:center;justify-content:center;gap:10px}
.login-eyebrow::before,.login-eyebrow::after{content:'';flex:1;max-width:40px;height:1px;background:var(--gold)}
.login-title{font-family:'Marcellus',serif;font-size:clamp(1.4rem,3vw,2rem);color:var(--text);
  letter-spacing:0.06em;margin-bottom:0.6rem}
.login-sub{font-size:0.82rem;color:var(--text2);margin-bottom:2.5rem}
.user-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:2rem}
.user-card{background:var(--dark3);border:1px solid var(--border);border-radius:10px;
  padding:1.2rem 0.8rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;
  gap:10px;transition:border-color .25s,transform .15s,background .25s}
.user-card:hover{border-color:var(--gold);transform:translateY(-3px);background:rgba(201,168,76,0.05)}
.user-card.selected{border-color:var(--gold);background:rgba(201,168,76,0.08)}
.avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Marcellus',serif;font-size:1.05rem;letter-spacing:-1px;border:1.5px solid;transition:all .25s}
.user-card .uname{font-family:'Marcellus',serif;font-size:0.75rem;letter-spacing:0.06em;color:var(--text);text-align:center;line-height:1.3}
.user-card .urole{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);text-align:center}
.pin-block{display:none;flex-direction:column;align-items:center;gap:12px;margin-top:0.5rem}
.pin-label{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2)}
.pin-row{display:flex;gap:8px;align-items:center}
.pin-input{background:var(--dark3);border:1px solid var(--border-strong);border-radius:6px;
  padding:10px 14px;color:var(--text);font-size:1.1rem;text-align:center;letter-spacing:0.4em;
  outline:none;width:160px;font-family:'Lora',serif;transition:border-color .2s}
.pin-input:focus{border-color:var(--gold)}
.btn-enter{background:var(--gold);border:none;border-radius:6px;color:var(--dark);
  padding:10px 24px;font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;font-family:'Marcellus',serif;transition:opacity .2s;white-space:nowrap}
.btn-enter:hover{opacity:.85}
.login-error{font-size:0.73rem;color:#d9534f;min-height:1rem}

/* === PORTAL === */
#portal{flex-direction:column}
.portal-header{background:var(--dark2);border-bottom:1px solid var(--border);
  padding:0.7rem clamp(1rem,4vw,3rem);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.portal-user-info{display:flex;align-items:center;gap:10px;flex:1}
.portal-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:0.72rem;font-family:'Marcellus',serif;border:1.5px solid;flex-shrink:0}
.portal-user-name{font-family:'Marcellus',serif;font-size:0.85rem;color:var(--text);letter-spacing:0.05em}
.portal-user-role{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2)}
.portal-sep{width:1px;height:30px;background:var(--border);margin:0 6px}
.btn-logout{background:none;border:none;color:var(--text3);font-size:0.68rem;letter-spacing:0.08em;
  text-transform:uppercase;cursor:pointer;font-family:'Lora',serif;padding:6px 10px;
  border-radius:4px;transition:color .2s}
.btn-logout:hover{color:var(--text2)}

/* TABS */
.tabs-bar{background:var(--dark2);border-bottom:1px solid var(--border);display:flex;
  padding:0 clamp(1rem,4vw,3rem);gap:0}
.tab-btn{padding:11px 20px;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;background:none;border-top:none;border-left:none;
  border-right:none;font-family:'Lora',serif}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pane{display:none;flex:1;overflow:hidden}
.tab-pane.active{display:flex;flex-direction:column;overflow:hidden}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;flex:1;min-height:0;height:calc(100vh - 72px - 48px - 44px)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px clamp(1rem,4vw,3rem);display:flex;
  flex-direction:column;gap:14px;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.bubble-row{display:flex;gap:10px;align-items:flex-start}
.bubble-row.user{flex-direction:row-reverse}
.bubble{max-width:72%;padding:10px 15px;border-radius:12px;font-size:0.82rem;
  line-height:1.65;white-space:pre-wrap}
.bubble.agent{background:var(--dark3);border:1px solid var(--border);color:var(--text);
  border-radius:4px 12px 12px 12px}
.bubble.user{background:var(--gold);color:var(--dark);border-radius:12px 4px 12px 12px;
  font-weight:500}
.bub-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:0.62rem;font-family:'Marcellus',serif;border:1.5px solid;flex-shrink:0}
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--text3);
  animation:pulse 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.25}40%{opacity:1}}
.chat-quick{padding:8px clamp(1rem,4vw,3rem);display:flex;flex-wrap:wrap;gap:6px}
.qbtn{background:var(--dark3);border:1px solid var(--border);border-radius:20px;
  padding:5px 13px;font-size:0.68rem;letter-spacing:0.05em;color:var(--text2);
  cursor:pointer;font-family:'Lora',serif;transition:all .2s}
.qbtn:hover{border-color:var(--gold);color:var(--gold)}
.chat-input-area{padding:12px clamp(1rem,4vw,3rem);border-top:1px solid var(--border);
  display:flex;gap:10px;align-items:flex-end}
.chat-textarea{flex:1;background:var(--dark3);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;color:var(--text);font-size:0.82rem;font-family:'Lora',serif;
  line-height:1.5;resize:none;outline:none;min-height:44px;max-height:120px;overflow-y:auto;
  transition:border-color .2s}
.chat-textarea:focus{border-color:var(--gold)}
.btn-send{background:var(--gold);border:none;border-radius:8px;color:var(--dark);
  padding:10px 20px;font-size:0.78rem;letter-spacing:0.1em;font-family:'Marcellus',serif;
  cursor:pointer;flex-shrink:0;transition:opacity .2s;height:44px}
.btn-send:disabled{opacity:.4;cursor:not-allowed}
.btn-send:hover:not(:disabled){opacity:.85}

/* LEADS */
.leads-pane{display:flex;flex-direction:column;flex:1;overflow:hidden}
.leads-toolbar{padding:14px clamp(1rem,4vw,3rem);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center}
.leads-label{font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text2)}
.btn-add{background:var(--gold);border:none;border-radius:6px;color:var(--dark);
  padding:8px 16px;font-size:0.72rem;letter-spacing:0.1em;font-family:'Marcellus',serif;cursor:pointer;transition:opacity .2s}
.btn-add:hover{opacity:.85}
.leads-list{flex:1;overflow-y:auto;padding:16px clamp(1rem,4vw,3rem);display:flex;flex-direction:column;gap:10px}
.lead-card{background:var(--dark3);border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.lead-name{font-family:'Marcellus',serif;font-size:0.88rem;color:var(--text);margin-bottom:4px}
.lead-meta{font-size:0.7rem;color:var(--text2)}
.lead-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0}
.badge{font-size:0.62rem;padding:3px 10px;border-radius:10px;letter-spacing:0.07em;text-transform:uppercase;font-weight:500}
.badge-novo{background:#0e1e0e;color:#5db85d;border:1px solid #1e3a1e}
.badge-contato{background:#0e0e1e;color:#7878d4;border:1px solid #1e1e3a}
.badge-qualif{background:#1e140a;color:var(--gold);border:1px solid #3a2a14}
.badge-proposta{background:#1e0e18;color:#d47878;border:1px solid #3a1e2c}
.badge-fechado{background:#0a1a1a;color:#5db8b8;border:1px solid #143a3a}
.lead-btns{display:flex;gap:5px}
.lbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 9px;
  font-size:0.62rem;color:var(--text2);cursor:pointer;font-family:'Lora',serif;transition:all .2s}
.lbtn:hover{border-color:var(--gold);color:var(--gold)}
.empty{text-align:center;color:var(--text3);font-size:0.82rem;padding:3rem 2rem;line-height:1.9}

/* HISTÓRICO */
.hist-pane{flex:1;overflow-y:auto;padding:16px clamp(1rem,4vw,3rem);display:flex;flex-direction:column;gap:8px}
.hist-item{background:var(--dark3);border:1px solid var(--border);border-radius:8px;
  padding:11px 14px;cursor:pointer;transition:border-color .2s}
.hist-item:hover{border-color:var(--gold)}
.hist-ts{font-size:0.65rem;color:var(--text3);margin-bottom:5px;letter-spacing:0.06em}
.hist-preview{font-size:0.78rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;
  align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:var(--dark2);border:1px solid var(--border-strong);border-radius:12px;
  padding:1.5rem;width:100%;max-width:380px;display:flex;flex-direction:column;gap:13px}
.modal-title{font-family:'Marcellus',serif;font-size:1rem;color:var(--gold);letter-spacing:0.08em}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2)}
.field input,.field select{background:var(--dark3);border:1px solid var(--border);border-radius:6px;
  padding:9px 12px;color:var(--text);font-size:0.8rem;font-family:'Lora',serif;outline:none;width:100%;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field select option{background:var(--dark3)}
.modal-btns{display:flex;gap:9px;justify-content:flex-end}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:6px;padding:8px 16px;
  color:var(--text2);font-size:0.72rem;cursor:pointer;font-family:'Lora',serif;transition:all .2s}
.btn-cancel:hover{border-color:var(--text2)}
.btn-save{background:var(--gold);border:none;border-radius:6px;padding:8px 20px;
  color:var(--dark);font-size:0.72rem;cursor:pointer;font-family:'Marcellus',serif;letter-spacing:0.1em;transition:opacity .2s}
.btn-save:hover{opacity:.85}
</style>
</head>
<body>

<!-- NAV FIXA -->
<nav>
  <a class="nav-brand" href="index.html">AÇÃOPREV · ADVOCACIA</a>
  <a class="nav-back" href="index.html">← Voltar ao Site</a>
</nav>

<!-- ==================== LOGIN ==================== -->
<div id="login" class="screen active">
  <div class="login-inner">
    <div class="login-eyebrow">Área Restrita</div>
    <h1 class="login-title">Portal do Colaborador</h1>
    <p class="login-sub">Selecione seu perfil para acessar seu agente de vendas</p>
    <div class="user-grid" id="userGrid"></div>
    <div class="pin-block" id="pinBlock">
      <div class="pin-label">Senha de acesso</div>
      <div class="pin-row">
        <input class="pin-input" type="password" id="pinInput" maxlength="6" placeholder="······">
        <button class="btn-enter" id="btnEnter">Entrar</button>
      </div>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<!-- ==================== PORTAL ==================== -->
<div id="portal" class="screen">
  <!-- Barra do usuário -->
  <div class="portal-header">
    <div class="portal-user-info">
      <div class="portal-avatar" id="portalAvatar"></div>
      <div>
        <div class="portal-user-name" id="portalName"></div>
        <div class="portal-user-role" id="portalRole"></div>
      </div>
    </div>
    <div class="portal-sep"></div>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>

  <!-- Abas -->
  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="agent">Agente IA</button>
    <button class="tab-btn" data-tab="leads">Leads</button>
    <button class="tab-btn" data-tab="hist">Histórico</button>
  </div>

  <!-- Aba: Agente -->
  <div class="tab-pane active chat-wrap" id="tab-agent">
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-quick" id="chatQuick"></div>
    <div class="chat-input-area">
      <textarea class="chat-textarea" id="chatInput" rows="1"
        placeholder="Pergunte ao seu agente de vendas..."></textarea>
      <button class="btn-send" id="btnSend">Enviar</button>
    </div>
  </div>

  <!-- Aba: Leads -->
  <div class="tab-pane leads-pane" id="tab-leads">
    <div class="leads-toolbar">
      <span class="leads-label" id="leadsCount">Meus Leads</span>
      <button class="btn-add" id="btnAddLead">+ Adicionar Lead</button>
    </div>
    <div class="leads-list" id="leadsList"></div>
  </div>

  <!-- Aba: Histórico -->
  <div class="tab-pane hist-pane" id="tab-hist" style="display:none"></div>

  <!-- Modal: Novo Lead -->
  <div class="modal-overlay" id="leadModal" style="display:none">
    <div class="modal">
      <div class="modal-title">Novo Lead</div>
      <div class="field"><label>Nome completo</label>
        <input id="fNome" placeholder="Ex.: João da Silva"></div>
      <div class="field"><label>Telefone / WhatsApp</label>
        <input id="fTel" placeholder="(00) 00000-0000"></div>
      <div class="field"><label>Área de interesse</label>
        <select id="fArea">
          <option>ACP dos Tetos</option>
          <option>Isenção de IR</option>
          <option>Auxílio-Acidente</option>
        </select></div>
      <div class="field"><label>Status no funil</label>
        <select id="fStatus">
          <option value="novo">Novo</option>
          <option value="contato">Em contato</option>
          <option value="qualif">Qualificado</option>
          <option value="proposta">Proposta enviada</option>
          <option value="fechado">Fechado</option>
        </select></div>
      <div class="field"><label>Observação</label>
        <input id="fObs" placeholder="Contexto relevante..."></div>
      <div class="modal-btns">
        <button class="btn-cancel" id="btnCancelLead">Cancelar</button>
        <button class="btn-save" id="btnSaveLead">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── USUÁRIOS ──────────────────────────────────────────────────────────────
const USERS = [
  {id:'rafael', name:'Rafael Bered', initials:'RB', pin:'1234', role:'Advogado Principal', color:'#C9A84C'},
  {id:'pedro',  name:'Pedro Outeiral', initials:'PO', pin:'1234', role:'Advogado Sênior', color:'#7878d4'},
  {id:'felipe', name:'Felipe Outeiral', initials:'FO', pin:'1234', role:'Advogado Associado', color:'#5db8b8'},
  {id:'tulio',  name:'Túlio Lampert', initials:'TL', pin:'1234', role:'Advogado Associado', color:'#d47878'},
  {id:'vinicius',name:'Vinícius Rost', initials:'VR', pin:'1234', role:'Ger. Financeiro', color:'#5db85d'},
];

const STATUS_LABEL = {novo:'Novo', contato:'Em contato', qualif:'Qualificado', proposta:'Proposta enviada', fechado:'Fechado'};
const STATUS_ORDER = ['novo','contato','qualif','proposta','fechado'];

const QUICK = {
  rafael:  ['Gerar script ACP dos Tetos','Como qualificar um lead?','Script para Isenção de IR','Meus leads em aberto'],
  pedro:   ['Script para Auxílio-Acidente','Como abordar aposentados?','Objeções mais comuns','Follow-up após silêncio'],
  felipe:  ['Roteiro ACP dos Tetos','Critérios Isenção de IR','Tese do RE 564.354 resumida','Script de recontato'],
  tulio:   ['Como identificar sequela?','Script Auxílio-Acidente passo a passo','Qualificar lead previdenciário','Documentos necessários'],
  vinicius:['Resumo das 3 teses','Como encaminhar leads?','Perguntas frequentes dos clientes','Scripts gerais de abordagem'],
};

let currentUser = null;
let selectedUser = null;
let chatHistory = [];
let isTyping = false;

// ── STORAGE ───────────────────────────────────────────────────────────────
const key = (type) => `acaoprev-portal-${currentUser.id}-${type}`;
async function getS(k){ try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null}catch{return null} }
async function setS(k,v){ try{await window.storage.set(k,JSON.stringify(v))}catch{} }

// ── RENDER LOGIN ──────────────────────────────────────────────────────────
function renderLogin(){
  const grid = document.getElementById('userGrid');
  grid.innerHTML = USERS.map(u=>`
    <div class="user-card" data-id="${u.id}" onclick="selectUser('${u.id}')">
      <div class="avatar" style="color:${u.color};border-color:${u.color}">${u.initials}</div>
      <div class="uname">${u.name}</div>
      <div class="urole">${u.role}</div>
    </div>`).join('');
}

function selectUser(id){
  selectedUser = USERS.find(u=>u.id===id);
  document.querySelectorAll('.user-card').forEach(c=>{
    c.classList.toggle('selected', c.dataset.id===id);
  });
  const pb = document.getElementById('pinBlock');
  pb.style.display='flex';
  document.getElementById('pinInput').value='';
  document.getElementById('loginError').textContent='';
  document.getElementById('pinInput').focus();
}

async function doLogin(){
  const pin = document.getElementById('pinInput').value;
  if(pin===selectedUser.pin){
    currentUser=selectedUser;
    await enterPortal();
  } else {
    document.getElementById('loginError').textContent='Senha incorreta. Tente novamente.';
  }
}

// ── PORTAL ────────────────────────────────────────────────────────────────
async function enterPortal(){
  document.getElementById('login').classList.remove('active');
  document.getElementById('portal').classList.add('active');

  const av=document.getElementById('portalAvatar');
  av.textContent=currentUser.initials;
  av.style.color=currentUser.color;
  av.style.borderColor=currentUser.color;
  document.getElementById('portalName').textContent=currentUser.name;
  document.getElementById('portalRole').textContent=currentUser.role;

  chatHistory = await getS(key('chat')) || [];
  renderChat();
  renderQuick();
  if(!chatHistory.length) sendWelcome();
  await renderLeads();
  renderHist();
}

function logout(){
  currentUser=null; selectedUser=null; chatHistory=[];
  document.getElementById('portal').classList.remove('active');
  document.getElementById('login').classList.add('active');
  document.getElementById('pinBlock').style.display='none';
  document.querySelectorAll('.user-card').forEach(c=>c.classList.remove('selected'));
  activateTab('agent');
}

// ── TABS ──────────────────────────────────────────────────────────────────
function activateTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  ['agent','leads','hist'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el){ el.classList.toggle('active',t===name); el.style.display=(t===name)?'flex':'none'; }
  });
  if(name==='leads') renderLeads();
  if(name==='hist')  renderHist();
}

// ── CHAT ──────────────────────────────────────────────────────────────────
function sendWelcome(){
  const first = currentUser.name.split(' ')[0];
  addMsg('agent',`Olá, ${first}! Sou seu agente de vendas da AÇÃOPREV. Estou aqui para te ajudar com:\n\n• Scripts de abordagem personalizados via WhatsApp para cada tese (ACP dos Tetos, Isenção de IR, Auxílio-Acidente)\n• Qualificação de perfil de leads\n• Respostas a objeções e estratégias de follow-up\n• Resumos das teses em linguagem simples para o cliente\n\nCom o que posso te ajudar agora?`);
}

function renderChat(){
  const c=document.getElementById('chatMsgs');
  c.innerHTML='';
  chatHistory.forEach(m=>appendBubble(m.role,m.content,false));
  c.scrollTop=c.scrollHeight;
}

function appendBubble(role,content,scroll=true){
  const c=document.getElementById('chatMsgs');
  const row=document.createElement('div');
  row.className=`bubble-row ${role}`;
  const color=role==='agent'?'var(--gold)':currentUser.color;
  const init=role==='agent'?'IA':currentUser.initials;
  const av=`<div class="bub-avatar" style="border-color:${color};color:${color}">${init}</div>`;
  row.innerHTML=`${role==='agent'?av:''}
    <div class="bubble ${role}">${escHtml(content)}</div>
    ${role==='user'?av:''}`;
  c.appendChild(row);
  if(scroll) c.scrollTop=c.scrollHeight;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') }

function showTyping(){
  const c=document.getElementById('chatMsgs');
  const row=document.createElement('div');
  row.id='typing';row.className='bubble-row agent';
  row.innerHTML=`<div class="bub-avatar" style="border-color:var(--gold);color:var(--gold)">IA</div>
    <div class="bubble agent"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  c.appendChild(row); c.scrollTop=c.scrollHeight;
}
function hideTyping(){ const t=document.getElementById('typing'); if(t)t.remove(); }

function addMsg(role,content){
  chatHistory.push({role,content,ts:Date.now()});
  setS(key('chat'),chatHistory);
  appendBubble(role,content);
}

function renderQuick(){
  const c=document.getElementById('chatQuick');
  const btns=QUICK[currentUser.id]||[];
  c.innerHTML=btns.map(b=>`<button class="qbtn" onclick="useQuick(this.textContent)">${b}</button>`).join('');
}
function useQuick(txt){ document.getElementById('chatInput').value=txt; sendMessage(); }

async function buildSystem(){
  const leads=await getS(key('leads'))||[];
  const lr=leads.length
    ? leads.map(l=>`- ${l.nome} | ${l.area} | ${STATUS_LABEL[l.status]}${l.obs?` | ${l.obs}`:''}`).join('\n')
    : 'Nenhum lead cadastrado ainda.';
  return `Você é um agente de vendas especializado em direito previdenciário, trabalhando para ${currentUser.name} da AÇÃOPREV Advocacia (Porto Alegre/Canela, RS).

Seu papel é ajudar ${currentUser.name.split(' ')[0]} a converter leads em clientes, oferecendo scripts de abordagem via WhatsApp, estratégias de qualificação e follow-up, respostas a objeções e resumos das teses jurídicas em linguagem acessível.

TESES DA AÇÃOPREV:
• ACP dos Tetos (RE 564.354): beneficiários do INSS entre jul/1999 e abr/2002 quando o teto era indevidamente baixo. Possível aumento de benefício + retroativo de até 5 anos.
• Isenção de IR: aposentados com doenças graves (neoplasia, cardiopatia, hepatopatia, etc.) têm isenção do IR. Muitos pagam imposto indevidamente há anos.
• Auxílio-Acidente: quem sofreu acidente de qualquer natureza e ficou com sequela permanente tem direito a 50% do salário de benefício, pago junto ao salário, até a aposentadoria, com atrasados de até 5 anos.

LEADS ATUAIS:
${lr}

Responda sempre em português. Seja direto, prático e orientado a ação. Scripts de WhatsApp devem ser próximos, empáticos e sem juridiquês. Limite respostas a ~250 palavras. Nunca invente jurisprudência.`;
}

async function sendMessage(){
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text||isTyping) return;
  inp.value=''; isTyping=true;
  document.getElementById('btnSend').disabled=true;
  addMsg('user',text);
  showTyping();
  const sys=await buildSystem();
  const msgs=chatHistory.slice(-14).filter(m=>m.role!=='system')
    .map(m=>({role:m.role==='agent'?'assistant':'user',content:m.content}));
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:msgs})
    });
    const d=await r.json();
    const reply=d.content?.[0]?.text||'Não foi possível processar. Tente novamente.';
    hideTyping(); addMsg('agent',reply);
  }catch{hideTyping();addMsg('agent','Erro de conexão. Verifique e tente novamente.');}
  isTyping=false;
  document.getElementById('btnSend').disabled=false;
  saveHist(text);
}

async function saveHist(preview){
  const h=await getS(key('hist'))||[];
  h.unshift({ts:Date.now(),preview:preview.slice(0,80)});
  if(h.length>40) h.pop();
  await setS(key('hist'),h);
}

// ── LEADS ─────────────────────────────────────────────────────────────────
async function renderLeads(){
  const leads=await getS(key('leads'))||[];
  const c=document.getElementById('leadsList');
  document.getElementById('leadsCount').textContent=
    leads.length?`Meus Leads (${leads.length})`:'Meus Leads';
  if(!leads.length){
    c.innerHTML='<div class="empty">Nenhum lead cadastrado ainda.<br>Clique em "+ Adicionar Lead" para começar a organizar sua prospecção.</div>';
    return;
  }
  c.innerHTML=leads.map((l,i)=>`
    <div class="lead-card">
      <div>
        <div class="lead-name">${l.nome}</div>
        <div class="lead-meta">${l.tel?l.tel+' · ':''}${l.area}${l.obs?' · '+l.obs:''}</div>
      </div>
      <div class="lead-right">
        <span class="badge badge-${l.status}">${STATUS_LABEL[l.status]}</span>
        <div class="lead-btns">
          <button class="lbtn" onclick="advanceLead(${i})">Avançar</button>
          <button class="lbtn" onclick="askScript(${i})">Script</button>
          <button class="lbtn" onclick="removeLead(${i})">Remover</button>
        </div>
      </div>
    </div>`).join('');
}

async function advanceLead(i){
  const leads=await getS(key('leads'))||[];
  const idx=STATUS_ORDER.indexOf(leads[i].status);
  if(idx<STATUS_ORDER.length-1){ leads[i].status=STATUS_ORDER[idx+1]; await setS(key('leads'),leads); renderLeads(); }
}
async function removeLead(i){
  const leads=await getS(key('leads'))||[];
  leads.splice(i,1); await setS(key('leads'),leads); renderLeads();
}
async function askScript(i){
  const leads=await getS(key('leads'))||[];
  const l=leads[i];
  activateTab('agent');
  document.getElementById('chatInput').value=
    `Gere um script de WhatsApp para o lead ${l.nome}, interessado em ${l.area}, status "${STATUS_LABEL[l.status]}"${l.obs?`. Contexto: ${l.obs}`:''}.`;
  sendMessage();
}

document.getElementById('btnAddLead').onclick=()=>document.getElementById('leadModal').style.display='flex';
document.getElementById('btnCancelLead').onclick=()=>document.getElementById('leadModal').style.display='none';
document.getElementById('btnSaveLead').onclick=async()=>{
  const nome=document.getElementById('fNome').value.trim();
  if(!nome){alert('Informe o nome do lead.');return;}
  const leads=await getS(key('leads'))||[];
  leads.push({nome,tel:document.getElementById('fTel').value.trim(),
    area:document.getElementById('fArea').value,
    status:document.getElementById('fStatus').value,
    obs:document.getElementById('fObs').value.trim(),ts:Date.now()});
  await setS(key('leads'),leads);
  document.getElementById('leadModal').style.display='none';
  ['fNome','fTel','fObs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fStatus').value='novo';
  renderLeads();
};

// ── HISTÓRICO ─────────────────────────────────────────────────────────────
async function renderHist(){
  const hist=await getS(key('hist'))||[];
  const c=document.getElementById('tab-hist');
  c.innerHTML='';
  if(!hist.length){
    c.innerHTML='<div class="empty">Nenhuma conversa registrada ainda.</div>';
    return;
  }
  hist.forEach(h=>{
    const el=document.createElement('div');
    el.className='hist-item';
    el.innerHTML=`<div class="hist-ts">${new Date(h.ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
      <div class="hist-preview">${h.preview}</div>`;
    c.appendChild(el);
  });
}

// ── EVENTOS ───────────────────────────────────────────────────────────────
document.getElementById('btnEnter').onclick=doLogin;
document.getElementById('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('btnLogout').onclick=logout;
document.getElementById('btnSend').onclick=sendMessage;
document.getElementById('chatInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>activateTab(b.dataset.tab)));

// ── INIT ──────────────────────────────────────────────────────────────────
renderLogin();
</script>
