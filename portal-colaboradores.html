<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal do Colaborador · AÇÃOPREV</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#e8c96e;--dark:#0D0D0D;--dark2:#141414;
  --dark3:#1C1C1C;--dark4:#242424;--text:#F0EAD6;--text2:#A89880;
  --text3:#666055;--border:rgba(201,168,76,0.18);--border-s:rgba(201,168,76,0.35);
  --r:8px;
}
html,body{height:100%;font-family:'Lora',serif;background:var(--dark);color:var(--text);line-height:1.7;font-size:15px}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,13,13,0.97);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--border);
  padding:0 clamp(1.5rem,5vw,4rem);display:flex;align-items:center;
  justify-content:space-between;height:70px}
.nav-brand{font-family:'Marcellus',serif;font-size:0.95rem;letter-spacing:0.22em;color:var(--gold);text-decoration:none}
.nav-back{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text2);
  text-decoration:none;border:1px solid var(--border-s);padding:7px 16px;border-radius:2px;transition:all .25s}
.nav-back:hover{color:var(--gold);border-color:var(--gold)}

/* SCREENS */
.screen{display:none;min-height:100vh;padding-top:70px}
.screen.active{display:flex;flex-direction:column}

/* ─── LOGIN ─────────────────────────────────── */
#sc-login{align-items:center;justify-content:center;padding:4rem 1.5rem}
.login-box{width:100%;max-width:540px;text-align:center}
.login-eyebrow{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);
  margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:10px}
.login-eyebrow::before,.login-eyebrow::after{content:'';width:36px;height:1px;background:var(--gold)}
.login-title{font-family:'Marcellus',serif;font-size:clamp(1.3rem,3vw,1.9rem);margin-bottom:.5rem;letter-spacing:.05em}
.login-sub{font-size:0.8rem;color:var(--text2);margin-bottom:2.2rem}
.user-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.8rem}
.ucard{background:var(--dark3);border:1px solid var(--border);border-radius:10px;
  padding:1.1rem .8rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;
  gap:9px;transition:all .22s}
.ucard:hover{border-color:var(--gold);transform:translateY(-2px);background:rgba(201,168,76,.05)}
.ucard.sel{border-color:var(--gold);background:rgba(201,168,76,.08)}
.av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Marcellus',serif;font-size:1rem;border:1.5px solid;transition:all .22s}
.ucard .un{font-family:'Marcellus',serif;font-size:0.72rem;letter-spacing:.05em;color:var(--text);text-align:center;line-height:1.3}
.ucard .ur{font-size:0.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);text-align:center}

/* pin block */
.pin-block{display:none;flex-direction:column;align-items:center;gap:11px}
.pin-label{font-size:0.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.pin-row{display:flex;gap:8px}
.pin-inp{background:var(--dark3);border:1px solid var(--border-s);border-radius:6px;
  padding:10px 14px;color:var(--text);font-size:1.05rem;text-align:center;letter-spacing:.35em;
  outline:none;width:160px;font-family:'Lora',serif;transition:border-color .2s}
.pin-inp:focus{border-color:var(--gold)}
.btn-go{background:var(--gold);border:none;border-radius:6px;color:var(--dark);
  padding:10px 22px;font-size:0.75rem;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;font-family:'Marcellus',serif;transition:opacity .2s;white-space:nowrap}
.btn-go:hover{opacity:.85}
.pin-err{font-size:0.7rem;color:#d9534f;min-height:1rem}
.lnk{font-size:.68rem;color:var(--text3);cursor:pointer;text-decoration:underline;margin-top:4px}
.lnk:hover{color:var(--text2)}

/* ─── FIRST-ACCESS MODAL ────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;
  align-items:center;justify-content:center;z-index:300;padding:1rem}
.modal{background:var(--dark2);border:1px solid var(--border-s);border-radius:12px;
  padding:1.6rem;width:100%;max-width:360px;display:flex;flex-direction:column;gap:13px}
.modal-title{font-family:'Marcellus',serif;font-size:1rem;color:var(--gold);letter-spacing:.08em}
.modal-sub{font-size:.75rem;color:var(--text2);line-height:1.6}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.field input,.field select{background:var(--dark3);border:1px solid var(--border);border-radius:6px;
  padding:9px 12px;color:var(--text);font-size:.8rem;font-family:'Lora',serif;outline:none;width:100%;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field select option{background:var(--dark3)}
.mbtns{display:flex;gap:9px;justify-content:flex-end}
.btn-cancel{background:none;border:1px solid var(--border);border-radius:6px;padding:8px 15px;
  color:var(--text2);font-size:.7rem;cursor:pointer;font-family:'Lora',serif;transition:all .2s}
.btn-cancel:hover{border-color:var(--text2)}
.btn-save{background:var(--gold);border:none;border-radius:6px;padding:8px 18px;
  color:var(--dark);font-size:.7rem;cursor:pointer;font-family:'Marcellus',serif;letter-spacing:.1em;transition:opacity .2s}
.btn-save:hover{opacity:.85}
.merr{font-size:.68rem;color:#d9534f;min-height:.9rem}

/* ─── PORTAL ─────────────────────────────────── */
#sc-portal{flex-direction:column}
.p-head{background:var(--dark2);border-bottom:1px solid var(--border);
  padding:.65rem clamp(1rem,4vw,3rem);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.p-user{display:flex;align-items:center;gap:10px;flex:1}
.p-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.68rem;font-family:'Marcellus',serif;border:1.5px solid;flex-shrink:0}
.p-name{font-family:'Marcellus',serif;font-size:.82rem;color:var(--text);letter-spacing:.04em}
.p-role{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.p-sep{width:1px;height:28px;background:var(--border);margin:0 4px}
.btn-logout,.btn-chpw{background:none;border:none;color:var(--text3);font-size:.65rem;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:'Lora',serif;
  padding:5px 8px;border-radius:4px;transition:color .2s}
.btn-logout:hover,.btn-chpw:hover{color:var(--text2)}
.btn-chpw{border:1px solid var(--border);border-radius:4px}

/* TABS */
.tabs-bar{background:var(--dark2);border-bottom:1px solid var(--border);
  display:flex;padding:0 clamp(1rem,4vw,3rem)}
.tab-btn{padding:10px 18px;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:'Lora',serif;transition:color .2s,border-color .2s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-pane{display:none;flex:1;flex-direction:column;overflow:hidden}
.tab-pane.active{display:flex}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;flex:1;
  height:calc(100vh - 70px - 46px - 42px)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px clamp(1rem,4vw,3rem);
  display:flex;flex-direction:column;gap:13px}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.brow{display:flex;gap:9px;align-items:flex-start}
.brow.user{flex-direction:row-reverse}
.bbl{max-width:72%;padding:10px 14px;border-radius:12px;font-size:.8rem;line-height:1.65;white-space:pre-wrap}
.bbl.agent{background:var(--dark3);border:1px solid var(--border);color:var(--text);border-radius:4px 12px 12px 12px}
.bbl.user{background:var(--gold);color:var(--dark);border-radius:12px 4px 12px 12px;font-weight:500}
.bav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.6rem;font-family:'Marcellus',serif;border:1.5px solid;flex-shrink:0}
.tdots{display:flex;gap:4px;align-items:center;padding:3px 0}
.tdots span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:pulse 1.2s infinite}
.tdots span:nth-child(2){animation-delay:.2s}
.tdots span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-quick{padding:7px clamp(1rem,4vw,3rem);display:flex;flex-wrap:wrap;gap:6px}
.qbtn{background:var(--dark3);border:1px solid var(--border);border-radius:20px;
  padding:4px 12px;font-size:.67rem;letter-spacing:.04em;color:var(--text2);
  cursor:pointer;font-family:'Lora',serif;transition:all .2s}
.qbtn:hover{border-color:var(--gold);color:var(--gold)}
.chat-ia{padding:10px clamp(1rem,4vw,3rem);border-top:1px solid var(--border);
  display:flex;gap:9px;align-items:flex-end}
.chat-ta{flex:1;background:var(--dark3);border:1px solid var(--border);border-radius:8px;
  padding:10px 13px;color:var(--text);font-size:.8rem;font-family:'Lora',serif;
  line-height:1.5;resize:none;outline:none;min-height:42px;max-height:110px;
  overflow-y:auto;transition:border-color .2s}
.chat-ta:focus{border-color:var(--gold)}
.btn-send{background:var(--gold);border:none;border-radius:8px;color:var(--dark);
  padding:10px 18px;font-size:.75rem;letter-spacing:.1em;font-family:'Marcellus',serif;
  cursor:pointer;flex-shrink:0;transition:opacity .2s;height:42px}
.btn-send:disabled{opacity:.35;cursor:not-allowed}
.btn-send:hover:not(:disabled){opacity:.85}

/* LEADS */
.leads-pane{flex-direction:column;flex:1;overflow:hidden}
.leads-tb{padding:12px clamp(1rem,4vw,3rem);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center}
.leads-lbl{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text2)}
.btn-add{background:var(--gold);border:none;border-radius:6px;color:var(--dark);
  padding:7px 14px;font-size:.7rem;letter-spacing:.1em;font-family:'Marcellus',serif;
  cursor:pointer;transition:opacity .2s}
.btn-add:hover{opacity:.85}
.leads-list{flex:1;overflow-y:auto;padding:14px clamp(1rem,4vw,3rem);
  display:flex;flex-direction:column;gap:9px}
.lcard{background:var(--dark3);border:1px solid var(--border);border-radius:10px;
  padding:12px 15px;display:flex;justify-content:space-between;align-items:flex-start;gap:11px}
.lname{font-family:'Marcellus',serif;font-size:.85rem;color:var(--text);margin-bottom:3px}
.lmeta{font-size:.68rem;color:var(--text2)}
.lright{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.badge{font-size:.6rem;padding:3px 9px;border-radius:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:500}
.b-novo{background:#0e1e0e;color:#5db85d;border:1px solid #1e3a1e}
.b-contato{background:#0e0e1e;color:#7878d4;border:1px solid #1e1e3a}
.b-qualif{background:#1e140a;color:var(--gold);border:1px solid #3a2a14}
.b-proposta{background:#1e0e18;color:#d47878;border:1px solid #3a1e2c}
.b-fechado{background:#0a1a1a;color:#5db8b8;border:1px solid #143a3a}
.lbtns{display:flex;gap:4px}
.lbtn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 8px;
  font-size:.6rem;color:var(--text2);cursor:pointer;font-family:'Lora',serif;transition:all .2s}
.lbtn:hover{border-color:var(--gold);color:var(--gold)}
.empty{text-align:center;color:var(--text3);font-size:.8rem;padding:3rem 2rem;line-height:1.9}

/* HISTÓRICO */
.hist-pane{flex:1;overflow-y:auto;padding:14px clamp(1rem,4vw,3rem);
  display:flex;flex-direction:column;gap:8px}
.hitem{background:var(--dark3);border:1px solid var(--border);border-radius:8px;
  padding:10px 13px;transition:border-color .2s}
.hts{font-size:.62rem;color:var(--text3);margin-bottom:4px;letter-spacing:.05em}
.hprev{font-size:.76rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>

<nav>

<!-- ══════════ LOGIN ══════════ -->
<div id="sc-login" class="screen active">
  <div class="login-box">
    <div class="login-eyebrow">Área Restrita</div>
    <h1 class="login-title">Portal do Colaborador</h1>
    <p class="login-sub">Selecione seu perfil e insira sua senha de acesso</p>
    <div class="user-grid" id="userGrid"></div>
    <div class="pin-block" id="pinBlock">
      <div class="pin-label" id="pinLabelTxt">Senha de acesso</div>
      <div class="pin-row">
        <input class="pin-inp" type="password" id="pinInp" maxlength="20" placeholder="······">
        <button class="btn-go" id="btnEnter">Entrar</button>
      </div>
      <div class="pin-err" id="pinErr"></div>
      <span class="lnk" id="lnkFirst">Primeiro acesso / Esqueci minha senha</span>
    </div>
  </div>
</div>

<!-- ══════════ PORTAL ══════════ -->
<div id="sc-portal" class="screen">
  <div class="p-head">
    <div class="p-user">
      <div class="p-av" id="pAv"></div>
      <div>
        <div class="p-name" id="pName"></div>
        <div class="p-role" id="pRole"></div>
      </div>
    </div>
    <div class="p-sep"></div>
    <button class="btn-chpw" id="btnChPw">Alterar senha</button>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="agent">Agente IA</button>
    <button class="tab-btn" data-tab="leads">Leads</button>
    <button class="tab-btn" data-tab="hist">Histórico</button>
  </div>

  <!-- AGENTE -->
  <div class="tab-pane active chat-wrap" id="tab-agent">
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-quick" id="chatQuick"></div>
    <div class="chat-ia">
      <textarea class="chat-ta" id="chatTa" rows="1" placeholder="Pergunte ao seu agente de vendas..."></textarea>
      <button class="btn-send" id="btnSend">Enviar</button>
    </div>
  </div>

  <!-- LEADS -->
  <div class="tab-pane leads-pane" id="tab-leads">
    <div class="leads-tb">
      <span class="leads-lbl" id="leadsLbl">Meus Leads</span>
      <button class="btn-add" id="btnAddLead">+ Adicionar Lead</button>
    </div>
    <div class="leads-list" id="leadsList"></div>
  </div>

  <!-- HISTÓRICO -->
  <div class="tab-pane hist-pane" id="tab-hist"></div>
</div>

<!-- ══════════ MODAL: DEFINIR / ALTERAR SENHA ══════════ -->
<div class="overlay" id="modalPw" style="display:none">
  <div class="modal">
    <div class="modal-title" id="mpwTitle">Definir senha de acesso</div>
    <div class="modal-sub" id="mpwSub">Crie uma senha pessoal para acessar o portal. Use de 4 a 20 caracteres.</div>
    <div class="field"><label>Nova senha</label>
      <input type="password" id="mpwNew" placeholder="Mínimo 4 caracteres" maxlength="20"></div>
    <div class="field"><label>Confirmar senha</label>
      <input type="password" id="mpwConf" placeholder="Repita a senha" maxlength="20"></div>
    <div class="merr" id="mpwErr"></div>
    <div class="mbtns">
      <button class="btn-cancel" id="btnPwCancel">Cancelar</button>
      <button class="btn-save" id="btnPwSave">Salvar senha</button>
    </div>
  </div>
</div>

<!-- ══════════ MODAL: NOVO LEAD ══════════ -->
<div class="overlay" id="modalLead" style="display:none">
  <div class="modal">
    <div class="modal-title">Novo Lead</div>
    <div class="field"><label>Nome completo</label>
      <input id="fNome" placeholder="Ex.: João da Silva"></div>
    <div class="field"><label>Telefone / WhatsApp</label>
      <input id="fTel" placeholder="(00) 00000-0000"></div>
    <div class="field"><label>Área de interesse</label>
      <select id="fArea">
        <option>ACP dos Tetos</option>
        <option>Isenção de IR</option>
        <option>Auxílio-Acidente</option>
      </select></div>
    <div class="field"><label>Status no funil</label>
      <select id="fStatus">
        <option value="novo">Novo</option>
        <option value="contato">Em contato</option>
        <option value="qualif">Qualificado</option>
        <option value="proposta">Proposta enviada</option>
        <option value="fechado">Fechado</option>
      </select></div>
    <div class="field"><label>Observação</label>
      <input id="fObs" placeholder="Contexto relevante..."></div>
    <div class="merr" id="leadErr"></div>
    <div class="mbtns">
      <button class="btn-cancel" id="btnLeadCancel">Cancelar</button>
      <button class="btn-save" id="btnLeadSave">Salvar</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIGURAÇÃO DOS USUÁRIOS ─────────────────────────────────────────────
// Senha padrão inicial (usada no primeiro acesso, até o colaborador definir a sua própria)
const DEFAULT_PIN = '1234';

const USERS = [
  {id:'rafael',   name:'Rafael Bered',     initials:'RB', role:'Advogado Principal',  color:'#C9A84C'},
  {id:'pedro',    name:'Pedro Outeiral',   initials:'PO', role:'Advogado Sênior',     color:'#7878d4'},
  {id:'felipe',   name:'Felipe Outeiral',  initials:'FO', role:'Advogado Associado',  color:'#5db8b8'},
  {id:'tulio',    name:'Túlio Lampert',    initials:'TL', role:'Advogado Associado',  color:'#d47878'},
  {id:'vinicius', name:'Vinícius Rost',    initials:'VR', role:'Gerente Financeiro',  color:'#5db85d'},
];

const STATUS_LABEL = {novo:'Novo',contato:'Em contato',qualif:'Qualificado',proposta:'Proposta enviada',fechado:'Fechado'};
const STATUS_ORDER = ['novo','contato','qualif','proposta','fechado'];

const QUICK = {
  rafael:  ['Gerar script ACP dos Tetos','Como qualificar um lead?','Script para Isenção de IR','Meus leads em aberto'],
  pedro:   ['Script Auxílio-Acidente','Como abordar aposentados?','Objeções mais comuns','Follow-up após silêncio'],
  felipe:  ['Roteiro ACP dos Tetos','Critérios Isenção de IR','Tese RE 564.354 resumida','Script de recontato'],
  tulio:   ['Como identificar sequela?','Script Auxílio-Acidente passo a passo','Qualificar lead previdenciário','Documentos necessários'],
  vinicius:['Resumo das 3 teses','Como encaminhar leads?','Perguntas frequentes dos clientes','Scripts de abordagem geral'],
};

// ─── ESTADO ────────────────────────────────────────────────────────────────
let cu = null;        // currentUser
let selUser = null;   // usuário selecionado na tela de login
let chatHistory = [];
let isTyping = false;

// ─── localStorage ──────────────────────────────────────────────────────────
const lsKey  = (type) => `acaoprev_${cu.id}_${type}`;
const pwKey  = (id)   => `acaoprev_${id}_pw`;
const lsGet  = (k)    => { try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null }catch{return null} };
const lsSet  = (k,v)  => { try{ localStorage.setItem(k,JSON.stringify(v)) }catch{} };
const getUserPw = (id) => lsGet(pwKey(id)) || DEFAULT_PIN;
const setUserPw = (id,pw) => lsSet(pwKey(id), pw);

// ─── RENDER LOGIN ──────────────────────────────────────────────────────────
function renderLogin(){
  const g = document.getElementById('userGrid');
  g.innerHTML = USERS.map(u=>`
    <div class="ucard" data-id="${u.id}" onclick="selectUser('${u.id}')">
      <div class="av" style="color:${u.color};border-color:${u.color}">${u.initials}</div>
      <div class="un">${u.name}</div>
      <div class="ur">${u.role}</div>
    </div>`).join('');
}

function selectUser(id){
  selUser = USERS.find(u=>u.id===id);
  document.querySelectorAll('.ucard').forEach(c=>c.classList.toggle('sel', c.dataset.id===id));
  const pb = document.getElementById('pinBlock');
  pb.style.display='flex';
  document.getElementById('pinInp').value='';
  document.getElementById('pinErr').textContent='';
  document.getElementById('pinInp').focus();
}

function doLogin(){
  const pin = document.getElementById('pinInp').value.trim();
  if(!pin){ document.getElementById('pinErr').textContent='Digite sua senha.'; return; }
  if(pin === getUserPw(selUser.id)){
    cu = selUser;
    enterPortal();
  } else {
    document.getElementById('pinErr').textContent='Senha incorreta. Tente novamente.';
  }
}

// ─── PORTAL ────────────────────────────────────────────────────────────────
function enterPortal(){
  document.getElementById('sc-login').classList.remove('active');
  document.getElementById('sc-portal').classList.add('active');
  const av=document.getElementById('pAv');
  av.textContent=cu.initials; av.style.color=cu.color; av.style.borderColor=cu.color;
  document.getElementById('pName').textContent=cu.name;
  document.getElementById('pRole').textContent=cu.role;
  chatHistory = lsGet(lsKey('chat')) || [];
  renderChat();
  renderQuick();
  if(!chatHistory.length) sendWelcome();
  renderLeads();
  renderHist();
  activateTab('agent');
}

function logout(){
  cu=null; selUser=null; chatHistory=[];
  document.getElementById('sc-portal').classList.remove('active');
  document.getElementById('sc-login').classList.add('active');
  document.getElementById('pinBlock').style.display='none';
  document.querySelectorAll('.ucard').forEach(c=>c.classList.remove('sel'));
  activateTab('agent');
}

// ─── MODAL SENHA ───────────────────────────────────────────────────────────
let pwContext = null; // 'first' | 'change'

function openPwModal(context){
  pwContext = context;
  const title = document.getElementById('mpwTitle');
  const sub   = document.getElementById('mpwSub');
  if(context==='first'){
    title.textContent='Primeiro acesso — Crie sua senha';
    sub.textContent=`Olá, ${selUser.name.split(' ')[0]}! Defina uma senha pessoal para acessar o portal. A senha padrão "${DEFAULT_PIN}" será substituída.`;
  } else {
    title.textContent='Alterar senha';
    sub.textContent='Defina uma nova senha pessoal para o portal.';
  }
  document.getElementById('mpwNew').value='';
  document.getElementById('mpwConf').value='';
  document.getElementById('mpwErr').textContent='';
  document.getElementById('modalPw').style.display='flex';
  document.getElementById('mpwNew').focus();
}

function closePwModal(){ document.getElementById('modalPw').style.display='none'; }

function savePw(){
  const nw   = document.getElementById('mpwNew').value.trim();
  const conf = document.getElementById('mpwConf').value.trim();
  const err  = document.getElementById('mpwErr');
  if(nw.length < 4){ err.textContent='A senha deve ter pelo menos 4 caracteres.'; return; }
  if(nw !== conf)  { err.textContent='As senhas não coincidem.'; return; }
  const targetUser = pwContext==='first' ? selUser : cu;
  setUserPw(targetUser.id, nw);
  closePwModal();
  if(pwContext==='first'){
    // faz login automático após criar a senha no primeiro acesso
    cu = selUser;
    enterPortal();
  } else {
    alert('Senha alterada com sucesso!');
  }
}

// ─── TABS ──────────────────────────────────────────────────────────────────
function activateTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  ['agent','leads','hist'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(!el) return;
    const on=t===name;
    el.classList.toggle('active',on);
    el.style.display=on?'flex':'none';
  });
  if(name==='leads') renderLeads();
  if(name==='hist')  renderHist();
}

// ─── CHAT ──────────────────────────────────────────────────────────────────
function sendWelcome(){
  const first = cu.name.split(' ')[0];
  addMsg('agent',`Olá, ${first}! Sou seu agente de vendas da AÇÃOPREV.\n\nEstou aqui para ajudar com:\n• Scripts de abordagem via WhatsApp (ACP dos Tetos, Isenção de IR, Auxílio-Acidente)\n• Qualificação de leads e análise do perfil do cliente\n• Respostas a objeções e estratégias de follow-up\n• Resumos das teses em linguagem acessível\n\nCom o que posso te ajudar agora?`);
}

function renderChat(){
  const c=document.getElementById('chatMsgs'); c.innerHTML='';
  chatHistory.forEach(m=>appendBubble(m.role,m.content,false));
  c.scrollTop=c.scrollHeight;
}

function appendBubble(role,content,scroll=true){
  const c=document.getElementById('chatMsgs');
  const row=document.createElement('div'); row.className=`brow ${role}`;
  const col=role==='agent'?'var(--gold)':cu.color;
  const init=role==='agent'?'IA':cu.initials;
  row.innerHTML=`${role==='agent'?`<div class="bav" style="border-color:${col};color:${col}">${init}</div>`:''}
    <div class="bbl ${role}">${escHtml(content)}</div>
    ${role==='user'?`<div class="bav" style="border-color:${col};color:${col}">${init}</div>`:''}`;
  c.appendChild(row);
  if(scroll) c.scrollTop=c.scrollHeight;
}

const escHtml = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

function showTyping(){
  const c=document.getElementById('chatMsgs');
  const row=document.createElement('div'); row.id='typing'; row.className='brow agent';
  row.innerHTML=`<div class="bav" style="border-color:var(--gold);color:var(--gold)">IA</div>
    <div class="bbl agent"><div class="tdots"><span></span><span></span><span></span></div></div>`;
  c.appendChild(row); c.scrollTop=c.scrollHeight;
}
function hideTyping(){ const t=document.getElementById('typing'); if(t)t.remove(); }

function addMsg(role,content){
  chatHistory.push({role,content,ts:Date.now()});
  lsSet(lsKey('chat'), chatHistory);
  appendBubble(role,content);
}

function renderQuick(){
  const c=document.getElementById('chatQuick');
  c.innerHTML=(QUICK[cu.id]||[]).map(b=>`<button class="qbtn" onclick="useQuick(this.textContent)">${b}</button>`).join('');
}
function useQuick(txt){ document.getElementById('chatTa').value=txt; sendMessage(); }

async function buildSystem(){
  const leads = lsGet(lsKey('leads')) || [];
  const lr = leads.length
    ? leads.map(l=>`- ${l.nome} | ${l.area} | ${STATUS_LABEL[l.status]}${l.obs?` | ${l.obs}`:''}`).join('\n')
    : 'Nenhum lead cadastrado ainda.';
  return `Você é um agente de vendas especializado em direito previdenciário, trabalhando para ${cu.name} da AÇÃOPREV Advocacia (Porto Alegre/Canela, RS).

Seu papel é ajudar ${cu.name.split(' ')[0]} a converter leads em clientes: scripts de abordagem via WhatsApp, qualificação de perfil, respostas a objeções, follow-up e resumos das teses em linguagem simples para o cliente.

TESES DA AÇÃOPREV:
• ACP dos Tetos (RE 564.354): beneficiários do INSS entre jul/1999 e abr/2002 quando o teto previdenciário era indevidamente baixo. Possível aumento + retroativo de até 5 anos.
• Isenção de IR: aposentados com doenças graves (neoplasia, cardiopatia, hepatopatia, etc.) têm direito à isenção do IR. Muitos pagam imposto indevido há anos.
• Auxílio-Acidente: quem sofreu acidente de qualquer natureza e ficou com sequela permanente tem direito a 50% do salário de benefício, pago junto ao salário até a aposentadoria, com retroativo de até 5 anos.

LEADS ATUAIS DE ${cu.name.toUpperCase()}:
${lr}

Responda sempre em português. Seja direto e orientado a ação. Scripts de WhatsApp: linguagem próxima, empática, sem juridiquês. Máx. ~250 palavras. Nunca invente jurisprudência.`;
}

async function sendMessage(){
  const ta=document.getElementById('chatTa');
  const text=ta.value.trim();
  if(!text||isTyping) return;
  ta.value=''; isTyping=true;
  document.getElementById('btnSend').disabled=true;
  addMsg('user',text); showTyping();
  const sys=await buildSystem();
  const msgs=chatHistory.slice(-14).filter(m=>m.role!=='system')
    .map(m=>({role:m.role==='agent'?'assistant':'user',content:m.content}));
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:msgs})
    });
    const d=await r.json();
    hideTyping(); addMsg('agent', d.content?.[0]?.text||'Não foi possível processar. Tente novamente.');
  }catch{ hideTyping(); addMsg('agent','Erro de conexão. Verifique e tente novamente.'); }
  isTyping=false; document.getElementById('btnSend').disabled=false;
  saveHist(text);
}

function saveHist(preview){
  const h=lsGet(lsKey('hist'))||[];
  h.unshift({ts:Date.now(),preview:preview.slice(0,80)});
  if(h.length>50) h.pop();
  lsSet(lsKey('hist'),h);
}

// ─── LEADS ─────────────────────────────────────────────────────────────────
function renderLeads(){
  const leads = lsGet(lsKey('leads')) || [];
  const c=document.getElementById('leadsList');
  document.getElementById('leadsLbl').textContent =
    leads.length ? `Meus Leads (${leads.length})` : 'Meus Leads';
  if(!leads.length){
    c.innerHTML='<div class="empty">Nenhum lead cadastrado.<br>Clique em "+ Adicionar Lead" para começar.</div>';
    return;
  }
  c.innerHTML=leads.map((l,i)=>`
    <div class="lcard">
      <div>
        <div class="lname">${l.nome}</div>
        <div class="lmeta">${l.tel?l.tel+' · ':''}${l.area}${l.obs?' · '+l.obs:''}</div>
      </div>
      <div class="lright">
        <span class="badge b-${l.status}">${STATUS_LABEL[l.status]}</span>
        <div class="lbtns">
          <button class="lbtn" onclick="advanceLead(${i})">Avançar</button>
          <button class="lbtn" onclick="askScript(${i})">Script</button>
          <button class="lbtn" onclick="removeLead(${i})">Remover</button>
        </div>
      </div>
    </div>`).join('');
}

function advanceLead(i){
  const leads=lsGet(lsKey('leads'))||[];
  const idx=STATUS_ORDER.indexOf(leads[i].status);
  if(idx<STATUS_ORDER.length-1){ leads[i].status=STATUS_ORDER[idx+1]; lsSet(lsKey('leads'),leads); renderLeads(); }
}
function removeLead(i){
  const leads=lsGet(lsKey('leads'))||[];
  leads.splice(i,1); lsSet(lsKey('leads'),leads); renderLeads();
}
function askScript(i){
  const leads=lsGet(lsKey('leads'))||[];
  const l=leads[i];
  activateTab('agent');
  document.getElementById('chatTa').value=
    `Gere um script de WhatsApp para o lead ${l.nome}, interessado em ${l.area}, status "${STATUS_LABEL[l.status]}"${l.obs?`. Contexto: ${l.obs}`:''}.`;
  sendMessage();
}

function openLeadModal(){
  ['fNome','fTel','fObs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fStatus').value='novo';
  document.getElementById('leadErr').textContent='';
  document.getElementById('modalLead').style.display='flex';
  document.getElementById('fNome').focus();
}
function closeLeadModal(){ document.getElementById('modalLead').style.display='none'; }
function saveLead(){
  const nome=document.getElementById('fNome').value.trim();
  if(!nome){ document.getElementById('leadErr').textContent='Informe o nome do lead.'; return; }
  const leads=lsGet(lsKey('leads'))||[];
  leads.push({
    nome,
    tel:document.getElementById('fTel').value.trim(),
    area:document.getElementById('fArea').value,
    status:document.getElementById('fStatus').value,
    obs:document.getElementById('fObs').value.trim(),
    ts:Date.now()
  });
  lsSet(lsKey('leads'),leads);
  closeLeadModal();
  renderLeads();
}

// ─── HISTÓRICO ─────────────────────────────────────────────────────────────
function renderHist(){
  const hist=lsGet(lsKey('hist'))||[];
  const c=document.getElementById('tab-hist'); c.innerHTML='';
  if(!hist.length){ c.innerHTML='<div class="empty">Nenhuma conversa registrada ainda.</div>'; return; }
  hist.forEach(h=>{
    const el=document.createElement('div'); el.className='hitem';
    el.innerHTML=`<div class="hts">${new Date(h.ts).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</div>
      <div class="hprev">${h.preview}</div>`;
    c.appendChild(el);
  });
}

// ─── EVENTOS ───────────────────────────────────────────────────────────────
document.getElementById('btnEnter').onclick = doLogin;
document.getElementById('pinInp').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

// Primeiro acesso / esqueci senha
document.getElementById('lnkFirst').onclick = () => {
  if(!selUser){ alert('Selecione seu perfil primeiro.'); return; }
  openPwModal('first');
};

// Alterar senha (dentro do portal)
document.getElementById('btnChPw').onclick = () => openPwModal('change');
document.getElementById('btnPwCancel').onclick = closePwModal;
document.getElementById('btnPwSave').onclick = savePw;
document.getElementById('mpwNew').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('mpwConf').focus(); });
document.getElementById('mpwConf').addEventListener('keydown',e=>{ if(e.key==='Enter') savePw(); });

document.getElementById('btnLogout').onclick = logout;
document.getElementById('btnSend').onclick = sendMessage;
document.getElementById('chatTa').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }
});
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>activateTab(b.dataset.tab)));

document.getElementById('btnAddLead').onclick = openLeadModal;
document.getElementById('btnLeadCancel').onclick = closeLeadModal;
document.getElementById('btnLeadSave').onclick = saveLead;

// ─── INIT ──────────────────────────────────────────────────────────────────
renderLogin();
</script>
</body>
</html>
